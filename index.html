<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #D4A017;
      --gold-light: #F5C842;
      --gold-pale: #FFF8E1;
      --black: #0D0D0D;
      --dark: #1A1A1A;
      --mid: #3D3D3D;
      --muted: #888;
      --border: #E5E5E5;
      --white: #FFFFFF;
      --red: #C0392B;
      --red-pale: #FDECEA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }
    h1, h2, .mono { font-family: 'Syne', sans-serif; }
    .mono-text { font-family: 'DM Mono', monospace; }

    /* HEADER */
    .header {
      background: var(--black);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid var(--gold);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1;
    }
    .header-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* SUMMARY CARDS */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
    .stat-card .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 12px 0 0 12px;
    }
    .stat-card .label {
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-card .sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ADD TASK FORM */
    .form-card {
      background: var(--black);
      border-radius: 14px;
      padding: 28px 28px 24px;
      color: var(--white);
    }
    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold-light);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
    }
    .form-group input,
    .form-group select {
      background: #1E1E1E;
      border: 1.5px solid #333;
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--gold); }
    .form-group select option { background: #1E1E1E; }
    .btn-add {
      background: var(--gold);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
      align-self: flex-end;
    }
    .btn-add:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* TASK TABLE */
    .table-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .table-header-row {
      padding: 16px 20px 12px;
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--black);
    }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1.5px solid var(--border);
      background: #FAFAFA;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #F0F0F0;
      transition: background 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #FAFAFA; }
    tbody td {
      padding: 12px 16px;
      font-size: 0.85rem;
      vertical-align: middle;
    }
    .task-title-cell { font-weight: 600; color: var(--black); max-width: 160px; }
    .task-title-cell .title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .client-cell { color: var(--mid); font-size: 0.82rem; }
    .assigned-cell { color: var(--mid); font-size: 0.82rem; }

    /* PRIORITY BADGES */
    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-high { background: var(--gold-pale); color: #8a6200; border: 1px solid #e8c84d; }
    .badge-medium { background: #EAF4FF; color: #1a5f9e; border: 1px solid #b3d4f5; }
    .badge-low { background: #F0F0F0; color: var(--mid); border: 1px solid #ddd; }

    /* STATUS SELECT */
    .status-select {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .status-select:focus { border-color: var(--gold); }
    .status-pending { color: #b45309; background: #FFF7ED; border-color: #fde68a; }
    .status-in-progress { color: #1a5f9e; background: #EAF4FF; border-color: #b3d4f5; }
    .status-done { color: #166534; background: #F0FDF4; border-color: #86efac; }

    /* PROGRESS */
    .progress-cell { min-width: 110px; }
    .progress-wrap { display: flex; align-items: center; gap: 7px; }
    .progress-bar-bg {
      flex: 1;
      height: 6px;
      background: #EBEBEB;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .progress-bar-fill.done-fill { background: #22c55e; }
    .progress-input {
      width: 44px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 5px;
      text-align: center;
      color: var(--black);
      outline: none;
    }
    .progress-input:focus { border-color: var(--gold); }

    /* ROW HIGHLIGHTS */
    tr.row-overdue td { background: var(--red-pale) !important; }
    tr.row-overdue:hover td { background: #fce8e6 !important; }
    tr.row-high td { background: var(--gold-pale) !important; }
    tr.row-high:hover td { background: #fff2cc !important; }
    tr.row-overdue.row-high td { background: var(--red-pale) !important; }

    /* ACTION BUTTONS */
    .btn-delete {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 8px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .btn-delete:hover { border-color: var(--red); color: var(--red); background: var(--red-pale); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.85rem; }

    /* LEGEND */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; padding: 10px 20px; border-top: 1px solid var(--border); background: #FAFAFA; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--mid); font-family: 'DM Mono', monospace; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .form-card { padding: 18px 14px; }
      .form-grid { grid-template-columns: 1fr; }
      .stat-card .value { font-size: 1.7rem; }
      main { padding: 14px 12px; gap: 16px; }
    }
    @media (max-width: 400px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ANIMATIONS */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeSlideIn 0.25s ease forwards; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--black);
      color: var(--gold-light);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 20px;
      border-radius: 8px;
      border-left: 3px solid var(--gold);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: all 0.25s;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

        </select>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn-add" onclick="addTask()">Add Task →</button>
      </div>
    </div>
  </div>

  <!-- TASK TABLE -->
  <div class="table-card">
    <div class="table-header-row">
      <span class="table-title">All Tasks</span>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('in-progress', this)">In Progress</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
        <button class="filter-btn" onclick="setFilter('overdue', this)">⚑ Overdue</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Client</th>
            <th>Assigned To</th>
            <th>Deadline</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Progress</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="task-tbody">
          <!-- Filled by JS -->
        </tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="icon">📋</div>
        <p>No tasks found. Add one above!</p>
      </div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#FDECEA;border:1px solid #f5a9a4;"></span>Overdue</span>
      <span class="legend-item"><span class="legend-dot" style="background:#FFF8E1;border:1px solid #e8c84d;"></span>High Priority</span>
    </div>
  </div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ——— STATE ———
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let currentFilter = 'all';

  // ——— UTILS ———
  function save() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }
  function today() {
    return new Date().toISOString().split('T')[0];
  }
  function isOverdue(task) {
    if (!task.deadline || task.status === 'done') return false;
    return task.deadline < today();
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[+m-1]} ${+day}, ${y}`;
  }

  // ——— HEADER DATE ———
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' }).toUpperCase();

  // ——— SUMMARY ———
  function renderSummary() {
    const total = tasks.length;
    const done = tasks.filter(t => t.status === 'done').length;
    const pending = tasks.filter(t => t.status === 'pending').length;
    const overdue = tasks.filter(t => isOverdue(t)).length;

    const cards = [
      { label: 'Total Tasks', value: total, sub: 'all tasks', color: '#0D0D0D' },
      { label: 'Completed', value: done, sub: `${total ? Math.round(done/total*100) : 0}% done`, color: '#22c55e' },
      { label: 'Pending', value: pending, sub: 'waiting to start', color: '#D4A017' },
      { label: 'Overdue', value: overdue, sub: 'past deadline', color: '#C0392B' },
    ];
    document.getElementById('summary-grid').innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="accent-bar" style="background:${c.color}"></div>
        <div class="label">${c.label}</div>
        <div class="value" style="color:${c.color}">${c.value}</div>
        <div class="sub">${c.sub}</div>
      </div>
    `).join('');
  }

  // ——— FILTER ———
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  // ——— RENDER TABLE ———
  function renderTable() {
    let filtered = tasks;
    if (currentFilter === 'overdue') filtered = tasks.filter(t => isOverdue(t));
    else if (currentFilter !== 'all') filtered = tasks.filter(t => t.status === currentFilter);

    const tbody = document.getElementById('task-tbody');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map((t, i) => {
      const over = isOverdue(t);
      const high = t.priority === 'high' && !over;
      const rowClass = over ? 'row-overdue' : (t.priority === 'high' ? 'row-high' : '');
      const pct = Math.min(100, Math.max(0, parseInt(t.progress) || 0));
      const fillClass = t.status === 'done' ? 'done-fill' : '';
      const statusClass = `status-${t.status}`;
      const badgeClass = `badge-${t.priority}`;

      return `
        <tr class="${rowClass} animate-in" data-id="${t.id}">
          <td class="task-title-cell"><span class="title-text" title="${esc(t.title)}">${esc(t.title)}</span></td>
          <td class="client-cell">${esc(t.client) || '—'}</td>
          <td class="assigned-cell">${esc(t.assign) || '—'}</td>
          <td style="white-space:nowrap;font-family:'DM Mono',monospace;font-size:0.78rem;color:${over?'#C0392B':'#555'}">
            ${fmtDate(t.deadline)}${over ? ' ⚑' : ''}
          </td>
          <td><span class="badge ${badgeClass}">${t.priority}</span></td>
          <td>
            <select class="status-select ${statusClass}" onchange="updateStatus('${t.id}', this)">
              <option value="pending" ${t.status==='pending'?'selected':''}>Pending</option>
              <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
              <option value="done" ${t.status==='done'?'selected':''}>Done</option>
            </select>
          </td>
          <td class="progress-cell">
            <div class="progress-wrap">
              <div class="progress-bar-bg">
                <div class="progress-bar-fill ${fillClass}" style="width:${pct}%"></div>
              </div>
              <input class="progress-input" type="number" min="0" max="100" value="${pct}"
                onchange="updateProgress('${t.id}', this)" onblur="updateProgress('${t.id}', this)"
                title="Progress %"/>
            </div>
          </td>
          <td>
            <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ——— ADD TASK ———
  function addTask() {
    const title = document.getElementById('f-title').value.trim();
    const client = document.getElementById('f-client').value.trim();
    const assign = document.getElementById('f-assign').value.trim();
    const deadline = document.getElementById('f-deadline').value;
    const priority = document.getElementById('f-priority').value;

    if (!title) { showToast('⚠ Task title is required!'); document.getElementById('f-title').focus(); return; }

    const task = { id: uid(), title, client, assign, deadline, priority, status: 'pending', progress: 0 };
    tasks.unshift(task);
    save();
    render();
    showToast('✓ Task added!');

    // Reset
    ['f-title','f-client','f-assign','f-deadline'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-priority').value = 'medium';
  }

  // ——— UPDATE STATUS ———
  function updateStatus(id, sel) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.status = sel.value;
    if (task.status === 'done' && task.progress < 100) task.progress = 100;
    if (task.status === 'pending') task.progress = task.progress > 0 ? task.progress : 0;
    save();
    render();
  }

  // ——— UPDATE PROGRESS ———
  function updateProgress(id, inp) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    let val = parseInt(inp.value) || 0;
    val = Math.min(100, Math.max(0, val));
    task.progress = val;
    if (val === 100) task.status = 'done';
    else if (val > 0 && task.status === 'pending') task.status = 'in-progress';
    save();
    render();
  }

  // ——— DELETE TASK ———
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
    showToast('Task removed.');
  }

  // ——— RENDER ALL ———
  function render() {
    renderSummary();
    renderTable();
  }

  // ——— ENTER KEY ON FORM ———
  document.querySelectorAll('.form-card input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  });

  // ——— INIT ———
  render();
</script>
</body>
</html>
